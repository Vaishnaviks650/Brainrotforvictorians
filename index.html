<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot to Formal | Transform Gen Z Slang to Victorian Prose</title>
    <meta name="description" content="Convert your skibidi sigma rizz brainrot slang into distinguished Victorian-era formal English">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎩</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&family=Geist:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="container">
        <header>
            <h1>
                <span class="asterisk ast-left">*</span>
                <span class="title-brain">Brain</span><span class="title-rot">rot</span>
                <span class="title-to">to</span>
                <span class="title-formal">Formal</span>
                <span class="asterisk ast-right">*</span>
            </h1>
            
            <p class="subtitle">
                Transform your <span class="sub-brainrot">skibidi sigma rizz</span> into <span class="sub-formal">distinguished Victorian prose</span>
            </p>

            <div class="example-badges">
                <div class="badge-pill pill-brainrot">no cap</div>
                <div class="badge-arrow">becomes</div>
                <div class="badge-pill pill-formal">I speak with utmost veracity</div>
            </div>
        </header>

        <main>
            <div class="translator-section">
                <div class="floating-label label-brainrot">BRAINROT INPUT</div>
                <div class="card">
                    <textarea id="inputText" placeholder="no cap bro that skibidi rizz was lowkey bussin fr fr ong..." maxlength="1000"></textarea>
                    <div class="card-footer">
                        <button id="randomBtn" class="btn action-btn">
                            <i data-lucide="shuffle"></i> Random Example
                        </button>
                        <span id="charCount" class="char-counter">0 / 1000</span>
                    </div>
                </div>
            </div>

            <div class="translate-action">
                <button id="translateBtn" class="btn btn-main">
                    <i data-lucide="arrow-down" id="translateIcon"></i> 
                    <span id="translateText">Make it Distinguished</span>
                </button>
                <div id="errorMsg" class="error-box hidden"></div>
            </div>

            <div class="translator-section">
                <div class="floating-label label-formal">FORMAL OUTPUT</div>
                <div class="card">
                    <div id="outputText" class="output-area empty">Your distinguished translation shall appear here, dear colleague...</div>
                    <div class="card-footer footer-right hidden" id="outputFooter">
                        <button id="copyBtn" class="btn action-btn">
                            <i data-lucide="copy" id="copyIcon"></i> <span id="copyText">Copy</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-card">
                Powered by <strong>Groq AI</strong> | <span class="footer-mono">llama-3.1-8b-instant</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
